{% extends "base.html" %}
{% block content %}
<h1>{{ site_name }}</h1>
<ul class="post-list">
  {% for post in posts %}
  <li>
    <a href="{{ base_url }}/posts/{{ post.slug }}/">{{ post.title }}</a>
    <span class="post-list-meta">{{ post.date }} / {{ post.genre }}</span>
  </li>
  {% else %}
  <li>まだ記事がありません。</li>
  {% endfor %}
</ul>
{% endblock %}
