<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ site_name }}{% endblock %}</title>
<meta name="description" content="{% block description %}{{ site_name }}{% endblock %}">
<meta name="google-site-verification" content="dfDlKnKQLDON6P3HuHjJEh4Y_U6xK0ZabMyPpsUA7fo" />
<link rel="stylesheet" href="{{ base_url }}/static/style.css">
<script async src="https://www.googletagmanager.com/gtag/js?id={{ ga_measurement_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ ga_measurement_id }}');
</script>
</head>
<body>
<header class="site-header">
  <a href="{{ base_url }}/">{{ site_name }}</a>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer class="site-footer">
  <p>本サイトはAmazonアソシエイト・楽天アフィリエイトプログラムを利用しています。</p>
</footer>
</body>
</html>
